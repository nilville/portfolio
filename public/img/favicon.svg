<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .prompt {
      fill: none;
      stroke: #50fa7b; /* Dracula green from style.css */
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .cursor {
      fill: #50fa7b;
    }
    @media (prefers-color-scheme: light) {
      .prompt {
        stroke: #111111; /* High contrast dark for light tabs */
      }
      .cursor {
        fill: #111111;
      }
    }
  </style>
  <path class="prompt" d="M 6,6 L 18,16 L 6,26" />
  <rect class="cursor" x="20" y="21" width="8" height="5" rx="1" />
</svg>
